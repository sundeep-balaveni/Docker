<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant Bloom</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        overflow: hidden;
    }

    .card {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
        max-width: 500px;
        position: relative;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 15px;
        background: linear-gradient(90deg, #ff9a9e, #fad0c4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p {
        font-size: 1.2rem;
        opacity: 0.8;
        margin-bottom: 30px;
    }

    .btn {
        padding: 12px 30px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(90deg, #ff6ec4, #7873f5);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #ff6ec4;
    }

    /* glowing circles */
    .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.6;
        animation: float 10s infinite alternate;
    }

    .circle1 {
        width: 200px;
        height: 200px;
        background: #ff6ec4;
        top: -50px;
        left: -50px;
    }

    .circle2 {
        width: 250px;
        height: 250px;
        background: #7873f5;
        bottom: -80px;
        right: -80px;
    }

    @keyframes float {
        from { transform: translateY(0px); }
        to { transform: translateY(30px); }
    }

    /* floating petals */
    .petal {
        position: absolute;
        font-size: 20px;
        animation: fall 8s linear infinite;
        opacity: 0.7;
    }

    @keyframes fall {
        0% {
            transform: translateY(-100px) rotate(0deg);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(100vh) rotate(360deg);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Elegant Bloom 🌸</h1>
    <p>Where beauty meets calm and design meets emotion.</p>
    <button class="btn">Feel the Beauty</button>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
</div>

<!-- floating petals -->
<div class="petal" style="left:10%; animation-delay:0s;">🌸</div>
<div class="petal" style="left:30%; animation-delay:2s;">🌺</div>
<div class="petal" style="left:50%; animation-delay:4s;">🌼</div>
<div class="petal" style="left:70%; animation-delay:1s;">🌷</div>
<div class="petal" style="left:85%; animation-delay:3s;">🌹</div>

</body>
</html>
