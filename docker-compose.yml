services:
  catalouge:
    build:
      context: ./CATALOUGE
      dockerfile: dockerfile
    image: catalouge:2.2.2
    container_name: catalouge
    depends_on:
    - mongodb
  mongodb:
    build:
      context: ./MONGODB
      dockerfile: dockerfile
    image: mongodb:2.2.2
    container_name: mongodb  
networks:
  default: 
    driver: bridge
    name: roboshop
    external: true


    


  
  