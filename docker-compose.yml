services:
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: dockerfile
    image: frontend:2.2.2
    container_name: frontend
    ports:
      - "80:80"
     # - "443:443"
    depends_on:
      - catalouge
      - user


  catalouge:
    build:
      context: ./CATALOUGE
      dockerfile: dockerfile
    image: catalogue:2.2.2
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build:
      context: ./ROBO-USER
      dockerfile: dockerfile
    image: user:2.2.2
    container_name: user
    depends_on: 
      - redis

  redis:
    image: redis:7.0
    container_name: redis
  mongodb:
    build:
      context: ./MONGODB
      dockerfile: dockerfile
    image: mongodb:2.2.2
    container_name: mongodb  
networks:
  default: 
    driver: bridge
    name: roboshop
    external: true


    


  
  