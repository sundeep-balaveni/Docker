<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Flower Page</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    p {
        font-size: 1.2rem;
        margin-bottom: 30px;
    }

    .flower {
        position: relative;
        width: 150px;
        height: 150px;
        margin: auto;
        animation: rotate 10s linear infinite;
    }

    .petal {
        width: 70px;
        height: 70px;
        background: radial-gradient(circle, #ff6ec4, #7873f5);
        border-radius: 50%;
        position: absolute;
        top: 40px;
        left: 40px;
        transform-origin: center;
    }

    .petal:nth-child(1) { transform: rotate(0deg) translateY(-50px); }
    .petal:nth-child(2) { transform: rotate(45deg) translateY(-50px); }
    .petal:nth-child(3) { transform: rotate(90deg) translateY(-50px); }
    .petal:nth-child(4) { transform: rotate(135deg) translateY(-50px); }
    .petal:nth-child(5) { transform: rotate(180deg) translateY(-50px); }
    .petal:nth-child(6) { transform: rotate(225deg) translateY(-50px); }
    .petal:nth-child(7) { transform: rotate(270deg) translateY(-50px); }
    .petal:nth-child(8) { transform: rotate(315deg) translateY(-50px); }

    .center {
        width: 50px;
        height: 50px;
        background: yellow;
        border-radius: 50%;
        position: absolute;
        top: 50px;
        left: 50px;
        box-shadow: 0 0 20px rgba(255,255,0,0.7);
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .floating-flowers span {
        position: absolute;
        font-size: 20px;
        animation: float 10s linear infinite;
        opacity: 0.7;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.2);
            opacity: 0;
        }
    }

    .btn {
        padding: 12px 25px;
        background: white;
        color: #ff6ec4;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff6ec4;
        color: white;
        box-shadow: 0 0 15px #ff6ec4;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Bloom with Beauty 🌸</h1>
    <p>Nature’s elegance in motion</p>

    <div class="flower">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="center"></div>
    </div>

    <br><br>
    <button class="btn">Explore More</button>
</div>

<div class="floating-flowers">
    <span style="left:10%; animation-delay:0s;">🌸</span>
    <span style="left:20%; animation-delay:2s;">🌺</span>
    <span style="left:35%; animation-delay:4s;">🌼</span>
    <span style="left:50%; animation-delay:1s;">🌷</span>
    <span style="left:65%; animation-delay:3s;">🌹</span>
    <span style="left:80%; animation-delay:5s;">🌻</span>
</div>

</body>
</html>
